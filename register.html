<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      .register-page {
        width: 100%;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background:
          linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
          url("IMG/banner.jpg");

        background-size: cover;
      }

      .register-box {
        width: 420px;

        background: white;

        padding: 40px;

        border-radius: 15px;

        text-align: center;
      }

      .register-box h1 {
        margin-bottom: 30px;
      }

      .input-box {
        width: 100%;

        padding: 15px;

        margin-bottom: 20px;

        border: 1px solid #ccc;

        border-radius: 10px;

        font-size: 16px;
      }

      .register-btn {
        width: 100%;

        padding: 15px;

        background: orange;

        color: white;

        border: none;

        border-radius: 10px;

        font-size: 18px;

        font-weight: bold;

        cursor: pointer;
      }

      .register-btn:hover {
        background: #ff6600;
      }

      .login-link {
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <section class="register-page">
      <div class="register-box">
        <h1>Đăng Ký</h1>

        <input type="text" placeholder="Tên tài khoản" class="input-box" />

        <input type="password" placeholder="Mật khẩu" class="input-box" />

        <input type="email" placeholder="Email" class="input-box" />

        <input type="SĐT" placeholder="SĐT" class="input-box" />

        <button class="register-btn">Đăng Ký</button>

        <div class="login-link">
          Đã có tài khoản ?

          <a href="login.html"> Đăng nhập </a>
        </div>
      </div>
    </section>
  </body>
</html>
