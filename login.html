<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đăng Nhập</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      .login-page {
        width: 100%;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background:
          linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
          url("IMG/banner.jpg");

        background-size: cover;
      }

      .login-box {
        width: 400px;

        background: white;

        padding: 40px;

        border-radius: 15px;

        text-align: center;
      }

      .login-box h1 {
        margin-bottom: 30px;
      }

      .input-box {
        width: 100%;

        padding: 15px;

        margin-bottom: 20px;

        border: 1px solid #ccc;

        border-radius: 10px;

        font-size: 16px;
      }

      .login-btn {
        width: 100%;

        padding: 15px;

        background: orange;

        color: white;

        border: none;

        border-radius: 10px;

        font-size: 18px;

        font-weight: bold;

        cursor: pointer;
      }

      .login-btn:hover {
        background: #ff6600;
      }

      .register-link {
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <section class="login-page">
      <div class="login-box">
        <h1>Đăng Nhập</h1>

        <input
          type="text"
          id="username"
          placeholder="Tên đăng nhập"
          class="input-box"
        />

        <input
          type="password"
          id="password"
          placeholder="Mật khẩu"
          class="input-box"
        />

        <button class="login-btn" onclick="login()">Đăng Nhập</button>

        <div class="register-link">
          Chưa có tài khoản ?

          <a href="register.html"> Đăng ký </a>
        </div>
      </div>
    </section>

    <script>
      function login() {
        // USERNAME
        const username = document.getElementById("username").value;

        // PASSWORD
        const password = document.getElementById("password").value;

        // CHECK
        if (username === "" || password === "") {
          alert("Vui lòng nhập đầy đủ");

          return;
        }

        // SAVE
        localStorage.setItem("user", username);

        // ALERT
        alert("Đăng nhập thành công");

        // REDIRECT
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
